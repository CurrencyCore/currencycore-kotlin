name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Distribution is via JitPack (https://jitpack.io) — it builds the artifact
# on-demand from the git tag, no registry credentials required. Consumers add
# the JitPack repo and `com.github.CurrencyCore:currencycore-kotlin:<tag>`.
# This workflow just proves the Maven publication builds.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew assemble publishToMavenLocal --console=plain
